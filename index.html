<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Old Maid - Battle Mode</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; background-color: #1b5e20; color: white; margin: 0; overflow-x: hidden; 
        }
        #status { font-size: 1.3em; padding: 15px; background: rgba(0,0,0,0.6); margin-bottom: 20px; }
        #opponent-hand, #my-hand { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 20px; min-height: 120px; }
        .card-wrapper { background: white; border-radius: 8px; padding: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s; }
        .card-img { width: 75px; display: block; border-radius: 4px; }
        .card-wrapper:hover { transform: translateY(-15px); }

        /* 裏面デザイン */
        .card-back {
            width: 75px; height: 112px; background-color: #b71c1c;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 7px, rgba(255,255,255,.1) 7px, rgba(255,255,255,.1) 14px),
                              repeating-linear-gradient(-45deg, transparent, transparent 7px, rgba(255,255,255,.1) 7px, rgba(255,255,255,.1) 14px);
            border: 3px solid white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s;
        }
        .card-back:hover { transform: translateY(15px); background-color: #d32f2f; }

        /* 捨てる演出 */
        .discard-animation { animation: fly-out 1s ease-in forwards; z-index: 1000; pointer-events: none; }
        @keyframes fly-out { to { transform: translateY(-1000px) rotate(45deg); opacity: 0; } }
        
        .deal-in { animation: deal-in-anim 0.5s ease-out backwards; }
        @keyframes deal-in-anim { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="status">サーバー接続待ち...</div>
    <div id="opponent-hand"></div>
    <div style="border-top: 2px dashed rgba(255,255,255,0.2); width: 80%; margin: 30px auto;"></div>
    <div id="my-hand"></div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');
        let canDraw = false;

        socket.onmessage = (event) => {
            const data = event.data;
            if (data.startsWith("STATE|")) {
                const [_, myCardsStr, oppCount, isTurn] = data.split("|");
                const myCards = myCardsStr ? myCardsStr.split(",").filter(s => s !== "").map(Number) : [];
                canDraw = (isTurn === "true");
                updateUI(myCards, parseInt(oppCount), canDraw);
            }
        };

        function updateUI(myCards, oppCount, isTurn) {
            const status = document.getElementById('status');
            status.innerText = isTurn ? "あなたの番です！" : "相手のターン...";
            status.style.color = isTurn ? "#ffeb3b" : "white";

            const oppDiv = document.getElementById('opponent-hand');
            oppDiv.innerHTML = "";
            for (let i = 0; i < oppCount; i++) {
                const cb = document.createElement('div');
                cb.className = "card-back";
                cb.onclick = () => { if(canDraw) { socket.send("DRAW:" + i); canDraw = false; } };
                oppDiv.appendChild(cb);
            }

            const myDiv = document.getElementById('my-hand');
            myDiv.innerHTML = "";
            const suits = ["hearts", "spades", "diamonds", "clubs"];
            const values = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];

            myCards.forEach((n, idx) => {
                const fileName = (n === 53) ? "black_joker.png" : `${values[(n - 1) % 13]}_of_${suits[Math.floor((n - 1) / 13)]}.png`;
                const wrap = document.createElement('div');
                wrap.className = "card-wrapper deal-in";
                wrap.id = `card-${n}`;
                wrap.style.animationDelay = `${idx * 0.05}s`;
                wrap.innerHTML = `<img src="images/png/${fileName}" class="card-img">`;
                myDiv.appendChild(wrap);
            });
        }
    </script>
</body>
</html>
