<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Royal Old Maid</title>
    <style>
        :root { --card-w: 80px; --card-h: 120px; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: radial-gradient(circle, #2e7d32, #1b5e20); color: white; margin: 0; height: 100vh; overflow: hidden; }
        #room-select { position: fixed; inset: 0; background: #1b5e20; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 30px; border: none; margin: 15px; width: 250px; text-align: center; }
        button { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; background: #ffd700; border: none; border-radius: 30px; font-weight: bold; color: #333; transition: 0.3s; }
        #status { font-size: 1.4rem; padding: 20px; background: rgba(0,0,0,0.4); min-height: 1.5em; }
        .hand-container { position: relative; height: 180px; display: flex; justify-content: center; align-items: center; padding: 20px; margin-top: 20px; }
        .card-wrapper { position: absolute; width: var(--card-w); height: var(--card-h); background: white; border-radius: 10px; padding: 5px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #ddd; }
        .card-img { width: 100%; height: 100%; border-radius: 6px; pointer-events: none; }
        .card-back { background: #c62828; border: 3px solid white; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px); }
        .selected-card { transform: translateY(25px) scale(1.1) !important; z-index: 100 !important; border: 4px solid #ffd700 !important; box-shadow: 0 0 25px #ffd700 !important; }
        .cursor-arrow { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; color: #ffd700; animation: bounce 0.5s infinite alternate; display: none; }
        @keyframes bounce { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-10px); } }
        #control-panel { display: flex; justify-content: center; gap: 15px; margin-top: 30px; min-height: 60px; }
        .nav-btn { background: #333; color: white; border-radius: 10px; border: none; padding: 10px 20px; cursor: pointer; }
        .draw-btn { background: #ffd700; color: #333; font-weight: bold; width: 200px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .discard-animation { animation: fly-away 1.5s forwards; z-index: 5000 !important; }
        @keyframes fly-away { 30% { transform: scale(1.2) translateY(-50px) rotate(-10deg); } 100% { transform: scale(0) translateY(-1000px) rotate(180deg); opacity: 0; } }
        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; flex-direction: column; justify-content: center; align-items: center; }
        #result-text { font-size: 5rem; font-weight: 900; margin-bottom: 30px; }
        .win { color: #ffd700; } .lose { color: #ff5252; }
    </style>
</head>
<body>
    <div id="room-select">
        <h1>ROYAL OLD MAID</h1>
        <input type="text" id="room-id-input" placeholder="Room ID">
        <button onclick="joinRoom()">入室する</button>
    </div>
    <div id="status">サーバーに接続中...</div>
    <div id="opponent-hand" class="hand-container"></div>
    <div id="control-panel"></div>
    <div style="height: 1px; background: rgba(255,255,255,0.1); width: 80%; margin: 15px auto;"></div>
    <div id="my-hand" class="hand-container"></div>
    <div id="result-overlay">
        <div id="result-text"></div>
        <div style="display: flex; gap: 20px;">
            <button onclick="requestRematch()" style="background: #4caf50; color: white;">再戦</button>
            <button onclick="location.reload()" style="background: #555; color: white;">終了</button>
        </div>
    </div>

    <script>
        // WebSocketのURL（RenderのURLに変更してください）
        const socket = new WebSocket('wss://old-maid-online.onrender.com');
        let isAnimating = false, selectedIndex = 0, currentOppCount = 0, myTurn = false;

        socket.onopen = () => { document.getElementById('status').innerText = "ルームIDを入力してください"; };
        socket.onclose = () => { document.getElementById('status').innerText = "切断されました。再読み込みしてください。"; };

        function joinRoom() {
            const id = document.getElementById('room-id-input').value;
            if (id && socket.readyState === 1) { 
                socket.send("JOIN_ROOM:" + id); 
                document.getElementById('room-select').style.display = "none"; 
            }
        }

        function requestRematch() { 
            socket.send("REMATCH_REQUEST"); 
            event.target.disabled = true; 
            event.target.innerText = "待機中...";
        }

        socket.onmessage = (event) => {
            const data = event.data;
            if (data.startsWith("STATE|")) {
                document.getElementById('result-overlay').style.display = "none";
                const [_, handStr, oppCount, isTurn] = data.split("|");
                myTurn = (isTurn === "true"); currentOppCount = parseInt(oppCount);
                renderGame(handStr.split(",").filter(s=>s).map(Number), currentOppCount, myTurn);
            } else if (data.startsWith("WINNER:")) { 
                showResult(data.split(":")[1]); 
            } else if (data === "OPPONENT_LEFT") { 
                alert("相手が退出しました"); location.reload(); 
            }
        };

        function renderGame(myCards, oppCount, isTurn) {
            const myDiv = document.getElementById('my-hand'), 
                  oppDiv = document.getElementById('opponent-hand'), 
                  status = document.getElementById('status'), 
                  ctrl = document.getElementById('control-panel');
            
            oppDiv.innerHTML = "";
            for (let i = 0; i < oppCount; i++) {
                const el = document.createElement('div'); el.className = "card-wrapper card-back";
                const offset = (i - (oppCount-1)/2) * 35;
                el.style.transform = `translateX(${offset}px) rotate(${(i - (oppCount-1)/2) * 4}deg)`;
                const arrow = document.createElement('div'); arrow.className = "cursor-arrow"; arrow.innerHTML = "▼";
                el.appendChild(arrow);
                el.onclick = () => { if(isTurn && !isAnimating) { selectedIndex = i; updateCursor(); confirmDraw(); } };
                oppDiv.appendChild(el);
            }

            ctrl.innerHTML = (isTurn && oppCount > 0) ? 
                `<button class="nav-btn" onclick="moveCursor(-1)">◀</button>
                 <button class="draw-btn" id="final-btn" onclick="confirmDraw()">カードを引く</button>
                 <button class="nav-btn" onclick="moveCursor(1)">▶</button>` : "";
            
            if (isTurn) {
                if (selectedIndex >= oppCount) selectedIndex = Math.max(0, oppCount - 1);
                updateCursor();
            }

            myDiv.innerHTML = "";
            const suits = ["hearts", "spades", "diamonds", "clubs"], 
                  vals = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];
            myCards.forEach((n, i) => {
                const file = (n === 53) ? "black_joker.png" : `${vals[(n-1)%13]}_of_${suits[Math.floor((n-1)/13)]}.png`;
                const el = document.createElement('div'); el.className = "card-wrapper"; el.id = `card-${n}`;
                const offset = (i - (myCards.length-1)/2) * 45;
                el.style.transform = `translateX(${offset}px) rotate(${(i - (myCards.length-1)/2) * 3}deg)`;
                el.innerHTML = `<img src="images/png/${file}" class="card-img">`;
                myDiv.appendChild(el);
            });

            setTimeout(() => {
                const map = {}; myCards.forEach(n => { if(n<53) { const v=(n-1)%13+1; (map[v]=map[v]||[]).push(n); } });
                let pairs = []; Object.values(map).forEach(g => { while(g.length >= 2) pairs.push(g.pop(), g.pop()); });
                if (pairs.length > 0) {
                    isAnimating = true; status.innerText = "ペアを捨てています...";
                    pairs.forEach(id => { const t = document.getElementById(`card-${id}`); if(t) t.classList.add('discard-animation'); });
                    setTimeout(() => { socket.send("DISCARD_DONE"); }, 1500);
                } else {
                    isAnimating = false;
                    if (myCards.length === 0 || oppCount === 0) { socket.send("DISCARD_DONE"); } 
                    else {
                        status.innerText = isTurn ? "あなたの番です！" : "相手が選び中...";
                        status.style.color = isTurn ? "#ffd700" : "white";
                    }
                }
            }, 600);
        }

        function moveCursor(dir) { if (currentOppCount > 0 && !isAnimating) { selectedIndex = (selectedIndex + dir + currentOppCount) % currentOppCount; updateCursor(); } }
        function updateCursor() { document.querySelectorAll('.card-back').forEach((el, i) => { const a = el.querySelector('.cursor-arrow'); if (i === selectedIndex) { el.classList.add('selected-card'); a.style.display = "block"; } else { el.classList.remove('selected-card'); a.style.display = "none"; } }); }
        function confirmDraw() { if (myTurn && !isAnimating && currentOppCount > 0) { isAnimating = true; socket.send("DRAW:" + selectedIndex); const b = document.getElementById('final-btn'); if(b) b.disabled = true; } }
        function showResult(msg) { const o = document.getElementById('result-overlay'), t = document.getElementById('result-text'); t.innerText = msg; t.className = msg.includes("WIN") ? "win" : "lose"; o.style.display = "flex"; }
        window.addEventListener('keydown', (e) => { if (myTurn && !isAnimating) { if (e.key === "ArrowLeft") moveCursor(-1); if (e.key === "ArrowRight") moveCursor(1); if (e.key === "Enter") confirmDraw(); } });
    </script>
</body>
</html>
