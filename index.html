<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Royal Old Maid - Grand Finale</title>
    <style>
        :root { --card-w: 100px; --card-h: 150px; --gold: #ffd700; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #071a08; color: white; margin: 0; overflow: hidden; text-align: center; }
        #game-screen { display: flex; flex-direction: column; align-items: center; height: 100vh; background: radial-gradient(circle at center, #1b5e20 0%, #071a08 100%); }
        #status-bar { font-size: 2rem; font-weight: 900; color: var(--gold); margin: 30px 0; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); letter-spacing: 2px; }
        .hand-area { position: relative; height: 220px; width: 100%; display: flex; justify-content: center; align-items: flex-end; perspective: 1200px; }
        
        .card-wrapper { 
            position: absolute; width: var(--card-w); height: var(--card-h); 
            border-radius: 12px; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            cursor: pointer; transform-style: preserve-3d; box-shadow: 0 8px 15px rgba(0,0,0,0.4); 
            background-size: cover; 
        }
        .card-back { background: #b71c1c; border: 3px solid #eee; background-image: repeating-linear-gradient(45deg, #b71c1c, #b71c1c 10px, #d32f2f 10px, #d32f2f 20px); }
        .my-card { background: white; border: 1px solid #ddd; }

        .cursor-arrow { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 3rem; display: none; filter: drop-shadow(0 0 8px orange); }
        .selected { transform: translateY(-40px) scale(1.1) !important; z-index: 500 !important; box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4); }
        .selected .cursor-arrow { display: block; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-15px); } }

        .discard-target { z-index: 1000 !important; transform: scale(1.2) translateY(-20px) !important; filter: brightness(1.5); border: 2px solid var(--gold) !important; }
        .discard-fly { animation: discardAnim 0.8s ease-in forwards; pointer-events: none; }
        @keyframes discardAnim { 0% { transform: scale(1.2) translateY(-20px) rotate(0); opacity: 1; } 100% { transform: scale(0.2) translateY(-1000px) rotate(720deg); opacity: 0; } }

        .draw-anim { transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; z-index: 2000 !important; }

        #control-panel { display: flex; align-items: center; gap: 20px; margin: 40px 0; height: 80px; }
        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; border-radius: 12px; cursor: pointer; }
        .draw-btn { background: linear-gradient(135deg, #ffd700, #ffb300); color: #222; border: none; padding: 20px 60px; border-radius: 50px; font-size: 1.6rem; cursor: pointer; font-weight: 900; box-shadow: 0 6px 20px rgba(0,0,0,0.4); margin: 10px; }
        .divider { width: 85%; height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
        .overlay { position: fixed; inset: 0; background: #071a08; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: white; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<audio id="bgm" src="jazz.mp3" loop></audio>

<div id="mode-overlay" class="overlay">
    <h1 style="color:var(--gold); font-size: 3.5rem; letter-spacing: 10px; margin-bottom: 50px;">ROYAL OLD MAID</h1>
    <button class="draw-btn" onclick="initCPU()">CPUと対戦する</button>
    <button class="draw-btn" onclick="showOnlineMenu()">オンラインで対戦する</button>
</div>

<div id="online-overlay" class="overlay" style="display: none;">
    <h1 style="color:var(--gold);">ONLINE MATCH</h1>
    <input type="text" id="room-input" placeholder="Room ID">
    <button class="draw-btn" onclick="joinOnline()">ENTER ROOM</button>
    <button style="background:none; border:none; color:#aaa; cursor:pointer;" onclick="location.reload()">戻る</button>
</div>

<div id="game-screen">
    <div id="status-bar">READY...</div>
    <div id="opp-hand-area" class="hand-area"></div>
    <div id="control-panel"></div>
    <div class="divider"></div>
    <div id="my-hand" class="hand-area"></div>
</div>

<script>
    let isCPUMode = false, socket = null, bgm = document.getElementById('bgm');
    let myHand = [], oppHand = [], oppCount = 0, isTurn = false, selectedIdx = 0, animating = false, isFirstLoad = true;

    function showOnlineMenu() { document.getElementById('mode-overlay').style.display = "none"; document.getElementById('online-overlay').style.display = "flex"; }

    function initCPU() {
        isCPUMode = true; document.getElementById('mode-overlay').style.display = "none";
        bgm.volume = 0.2; bgm.play().catch(e => {});
        let deck = Array.from({length: 53}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        myHand = deck.slice(0, 27); oppHand = deck.slice(27, 53);
        animating = true; updateUI();
        document.getElementById('status-bar').innerText = "手札を整理中...";
        setTimeout(checkPairs, 1000);
    }

    function joinOnline() {
        isCPUMode = false; const rid = document.getElementById('room-input').value; if(!rid) return;
        socket = new WebSocket('wss://old-maid-online.onrender.com');
        socket.onmessage = (e) => {
            const data = e.data;
            if (data.startsWith("STATE|")) {
                const [_, cards, count, turn] = data.split("|");
                const newHand = cards.split(",").filter(s=>s).map(Number);
                const newOppCount = parseInt(count);
                const newIsTurn = (turn === "true");

                if (animating) {
                    // アニメーション中のため反映を少し遅らせる
                    setTimeout(() => {
                        myHand = newHand; oppCount = newOppCount; isTurn = newIsTurn;
                        updateUI(); if (isTurn) checkPairs();
                    }, 800);
                } else {
                    myHand = newHand; oppCount = newOppCount; isTurn = newIsTurn;
                    document.getElementById('online-overlay').style.display = "none";
                    updateUI();
                    if (isFirstLoad) { isFirstLoad = false; setTimeout(checkPairs, 1000); }
                }
            } else if (data.startsWith("WINNER:")) {
                const msg = data.split(":")[1]; document.getElementById('status-bar').innerText = msg;
                setTimeout(() => { alert(msg); location.reload(); }, 1000);
            }
        };
        socket.onopen = () => { socket.send("JOIN_ROOM:" + rid); bgm.volume = 0.2; bgm.play().catch(e => {}); };
    }

    function getCardFile(n) {
        if (n === 53) return "black_joker.png";
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        return `${names[val] || val}_of_${suit}.png`;
    }

    function updateUI() {
        if (animating) return;
        const oppArea = document.getElementById('opp-hand-area'), myArea = document.getElementById('my-hand');
        const count = isCPUMode ? oppHand.length : oppCount;
        if (selectedIdx >= count) selectedIdx = Math.max(0, count - 1);

        while (oppArea.children.length < count) { oppArea.appendChild(document.createElement('div')); }
        while (oppArea.children.length > count) { oppArea.removeChild(oppArea.lastChild); }
        Array.from(oppArea.children).forEach((el, i) => {
            el.className = "card-wrapper card-back";
            el.style.transform = `translateX(${(i - (count-1)/2) * 35}px) rotate(${(i - (count-1)/2) * 2}deg)`;
            el.style.zIndex = i;
            if (isTurn && i === selectedIdx) { el.classList.add('selected'); el.innerHTML = `<div class="cursor-arrow">▼</div>`; }
            else { el.classList.remove('selected'); el.innerHTML = ""; }
            el.onclick = () => { if(isTurn && !animating) { selectedIdx = i; updateUI(); } };
        });

        const existingIds = myHand.map(n => `card-${n}`);
        Array.from(myArea.children).forEach(el => { if (!existingIds.includes(el.id) && !el.classList.contains('discard-fly') && !el.classList.contains('draw-anim')) myArea.removeChild(el); });
        myHand.forEach((n, i) => {
            let el = document.getElementById(`card-${n}`);
            if (!el) {
                el = document.createElement('div'); el.id = `card-${n}`; el.className = "card-wrapper my-card";
                el.innerHTML = `<img src="images/png/${getCardFile(n)}" style="width:100%;height:100%;border-radius:10px;pointer-events:none;" onerror="this.src='https://via.placeholder.com/100x150?text=Card'">`;
                myArea.appendChild(el);
            }
            if(!el.classList.contains('discard-fly') && !el.classList.contains('draw-anim')) {
                el.style.transform = `translateX(${(i - (myHand.length-1)/2) * 45}px) rotate(${(i - (myHand.length-1)/2) * 1}deg)`;
                el.style.zIndex = i;
            }
        });

        const status = document.getElementById('status-bar'); const panel = document.getElementById('control-panel');
        status.innerText = isTurn ? "あなたの番です！" : (isCPUMode ? "相手の番です..." : "対戦相手の番です...");
        status.style.color = isTurn ? "var(--gold)" : "#aaa";
        if (isTurn && count > 0) {
            panel.innerHTML = `<button class="nav-btn" onclick="move(-1)">◀ 左</button><button class="draw-btn" onclick="confirmDraw()">カードを引く</button><button class="nav-btn" onclick="move(1)">右 ▶</button>`;
        } else { panel.innerHTML = ""; }
    }

    function animateCardDraw(fromEl, isToPlayer, cardValue, callback) {
        if (!fromEl) { callback(); return; }
        const rect = fromEl.getBoundingClientRect();
        const clone = fromEl.cloneNode(true);
        clone.classList.remove('selected'); clone.classList.add('draw-anim');
        clone.style.position = 'fixed'; clone.style.top = rect.top + 'px'; clone.style.left = rect.left + 'px';
        clone.style.margin = '0'; clone.style.transform = 'none';
        document.body.appendChild(clone);

        const destY = isToPlayer ? window.innerHeight - 200 : 100;
        const destX = window.innerWidth / 2 - 50;

        setTimeout(() => {
            clone.style.top = destY + 'px'; clone.style.left = destX + 'px';
            if (isToPlayer && cardValue) {
                clone.classList.remove('card-back'); clone.classList.add('my-card');
                clone.innerHTML = `<img src="images/png/${getCardFile(cardValue)}" style="width:100%;height:100%;border-radius:10px;">`;
                clone.style.transform = 'rotateY(180deg) scale(1.2)';
            } else if (isToPlayer) {
                clone.style.transform = 'scale(1.2) rotate(10deg)';
            }
        }, 10);

        setTimeout(() => { if (document.body.contains(clone)) document.body.removeChild(clone); callback(); }, 800);
    }

    function confirmDraw() {
        if(!isTurn || animating) return;
        const count = isCPUMode ? oppHand.length : oppCount;
        if(count === 0) return;

        animating = true;
        const selectedEl = document.getElementById('opp-hand-area').children[selectedIdx];
        
        if(isCPUMode) {
            const val = oppHand[selectedIdx];
            animateCardDraw(selectedEl, true, val, () => {
                myHand.push(oppHand.splice(selectedIdx, 1)[0]);
                updateUI(); setTimeout(checkPairs, 500);
            });
        } else {
            // オンライン演出：STATE受信前にアニメーションを開始
            animateCardDraw(selectedEl, true, null, () => {
                socket.send("DRAW:" + selectedIdx);
                // STATE受信でanimatingが解除されるまで待機
            });
        }
    }

    function checkPairs() {
        const counts = {}; myHand.forEach(n => { if(n<53) { const v=(n-1)%13+1; (counts[v]=counts[v]||[]).push(n); } });
        const pairs = []; Object.values(counts).forEach(arr => { while(arr.length >= 2) pairs.push(arr.pop(), arr.pop()); });

        if (isCPUMode) {
            let cC = {}; oppHand.forEach(n => { if(n<53) { let v=(n-1)%13+1; cC[v]=(cC[v]||0)+1; } });
            oppHand = oppHand.filter(n => { if(n === 53) return true; let v=(n-1)%13+1; if(cC[v] % 2 === 0) return false; cC[v] = 0; return true; });
        }

        if (pairs.length > 0) {
            animating = true;
            pairs.forEach(id => { const el = document.getElementById("card-" + id); if(el) el.classList.add('discard-target'); });
            setTimeout(() => {
                pairs.forEach(id => { const el = document.getElementById("card-" + id); if(el) el.classList.add('discard-fly'); });
                setTimeout(() => {
                    myHand = myHand.filter(n => !pairs.includes(n));
                    finishTurnProcessing();
                }, 800);
            }, 600);
        } else {
            finishTurnProcessing();
        }
    }

    function finishTurnProcessing() {
        if (checkGameOver()) return;
        if (isCPUMode) {
            if (document.getElementById('status-bar').innerText === "手札を整理中...") {
                isTurn = true; animating = false; updateUI();
            } else {
                if (isTurn) { isTurn = false; animating = false; updateUI(); setTimeout(cpuTurn, 1000); }
                else { isTurn = true; animating = false; updateUI(); }
            }
        } else {
            socket.send("DISCARD_DONE"); animating = false; updateUI();
        }
    }

    function cpuTurn() {
        if (checkGameOver() || animating) return;
        animating = true;
        const targetIdx = Math.floor(Math.random() * myHand.length);
        const targetEl = document.getElementById(`card-${myHand[targetIdx]}`);

        animateCardDraw(targetEl, false, null, () => {
            oppHand.push(myHand.splice(targetIdx, 1)[0]);
            let cC = {}; oppHand.forEach(n => { if(n<53) { let v=(n-1)%13+1; cC[v]=(cC[v]||0)+1; } });
            oppHand = oppHand.filter(n => { if(n === 53) return true; let v=(n-1)%13+1; if(cC[v] % 2 === 0) return false; cC[v] = 0; return true; });
            myHand.sort(() => Math.random() - 0.5); oppHand.sort(() => Math.random() - 0.5);
            setTimeout(() => { isTurn = true; animating = false; if(!checkGameOver()) updateUI(); }, 400);
        });
    }

    function checkGameOver() {
        const win = myHand.length === 0, lose = (isCPUMode && oppHand.length === 0);
        if (win || lose) {
            let msg = win ? "あなたの勝ち！" : "あなたの負け...";
            if (win && lose) msg = "引き分け！";
            document.getElementById('status-bar').innerText = msg;
            setTimeout(() => { alert(msg); location.reload(); }, 1000); return true;
        }
        return false;
    }

    function move(dir) {
        if(!isTurn || animating) return;
        const count = isCPUMode ? oppHand.length : oppCount;
        if(count > 0) { selectedIdx = (selectedIdx + dir + count) % count; updateUI(); }
    }

    window.onkeydown = (e) => {
        if(e.key === "ArrowLeft") move(-1); if(e.key === "ArrowRight") move(1); if(e.key === "Enter") confirmDraw();
    };
</script>
</body>
</html>
