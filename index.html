<script>
    const socket = new WebSocket('wss://old-maid-online.onrender.com');
    let myHand = [], oppCount = 0, isTurn = false, selectedIdx = 0, animating = false;

    socket.onmessage = (e) => {
        const data = e.data;
        if (data.startsWith("STATE|")) {
            const [_, cards, count, turn] = data.split("|");
            myHand = cards.split(",").filter(s=>s).map(Number);
            oppCount = parseInt(count);
            isTurn = (turn === "true");
            
            // 通信が届いても、演出中はUIを書き換えない（勝手に動くのを防ぐ）
            if (!animating) {
                document.getElementById('room-overlay').style.display = "none";
                updateUI();
            }
        } else if (data.startsWith("WINNER:")) {
            alert(data.split(":")[1]);
            location.reload();
        }
    };

    function updateUI() {
        // ... (中略：描画処理はそのまま) ...
        
        // ★重要：勝手に checkPairs() を呼ばないように変更
        // updateUIは「描画するだけ」に徹し、ペアチェックは必要なタイミングで手動で呼ぶ
    }

    function confirmDraw() {
        if(!isTurn || animating || oppCount === 0) return;
        animating = true;
        document.getElementById('draw-confirm').disabled = true;
        
        // 1. まずサーバーに引くことを伝える
        socket.send("DRAW:" + selectedIdx);

        // 2. サーバーから返答が来るまで待機し、届いたら演出後にペアチェックへ
        // (socket.onmessage 内で animating が管理される)
        
        // 演出時間を確保するため、少し遅らせてペアチェックを起動するように変更
        setTimeout(() => {
            checkPairs();
        }, 1000); 
    }

    function checkPairs() {
        const counts = {};
        myHand.forEach(n => { if(n<53) { const v=(n-1)%13+1; (counts[v]=counts[v]||[]).push(n); } });
        const pairs = [];
        Object.values(counts).forEach(arr => { while(arr.length >= 2) pairs.push(arr.pop(), arr.pop()); });

        if (pairs.length > 0) {
            animating = true; // 捨てるアニメーション開始
            setTimeout(() => {
                pairs.forEach(id => {
                    const el = document.getElementById("card-" + id);
                    if(el) el.classList.add('discard');
                });
                // アニメーション完了後に初めてサーバーへ「終わったよ」と送る
                setTimeout(() => { 
                    socket.send("DISCARD_DONE");
                    animating = false;
                    updateUI();
                }, 1000);
            }, 500);
        } else {
            // ペアがない場合は、ここで初めて入力を受け付け可能にする
            animating = false;
            if (myHand.length === 0 || oppCount === 0) {
                socket.send("DISCARD_DONE");
            }
        }
    }
</script>
