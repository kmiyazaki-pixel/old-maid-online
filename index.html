<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web Old Maid</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2e7d32; color: white; margin-top: 50px; }
        #hand { display: flex; justify-content: center; gap: 5px; margin-top: 20px; flex-wrap: wrap; }
        .card-img { width: 80px; height: auto; transition: transform 0.2s; }
        .card-img:hover { transform: translateY(-10px); cursor: pointer; }
    </style>
</head>
<body>
    <div id="main-display">
        <h1>Web Old Maid</h1>
        <p id="status">接続中...</p>
    </div>
    <div id="hand"></div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');

        socket.onopen = () => {
            document.getElementById('status').innerText = "接続成功！対戦相手を待っています...";
        };

        socket.onmessage = (event) => {
            const msg = event.data;
            console.log("受信メッセージ:", msg);

            if (msg.startsWith("HAND:")) {
                const cardNumbers = msg.replace("HAND:", "").split(",");
                const handDiv = document.getElementById('hand');
                handDiv.innerHTML = ""; 

                // あなたのファイル名規則 [値]_of_[マーク].png に変換
                const suits = ["hearts", "spades", "diamonds", "clubs"];
                const values = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];

                cardNumbers.forEach(num => {
                    const n = parseInt(num);
                    let fileName = "";

                    if (n === 53) {
                        fileName = "black_joker.png"; // ジョーカーの名前を確認！
                    } else {
                        const suit = suits[Math.floor((n - 1) / 13)];
                        const value = values[(n - 1) % 13];
                        fileName = `${value}_of_${suit}.png`; 
                    }

                    const img = document.createElement('img');
                    // images/png/ フォルダの中にある場合
                    img.src = `images/png/${fileName}`; 
                    img.className = "card-img";
                    
                    // 画像がない場合の身代わり（デバッグ用）
                    img.onerror = () => {
                        console.error("画像未発見:", img.src);
                        img.alt = fileName; // 画像が出ない時に名前だけ出す
                    };
                    
                    handDiv.appendChild(img);
                });
                
                document.getElementById('status').innerText = "対戦開始！あなたの手札です。";
            }
        };
    </script>
</body>
</html>
