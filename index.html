<script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');
        let isAnimating = false, selectedIndex = 0, currentOppCount = 0, myTurn = false;

        function joinRoom() {
            const id = document.getElementById('room-id-input').value;
            if (id && socket.readyState === 1) { 
                socket.send("JOIN_ROOM:" + id); 
                document.getElementById('room-select').style.display = "none"; 
            }
        }
        function requestRematch() { socket.send("REMATCH_REQUEST"); event.target.disabled = true; }

        socket.onmessage = (event) => {
            const data = event.data;
            if (data.startsWith("STATE|")) {
                document.getElementById('result-overlay').style.display = "none";
                const [_, handStr, oppCount, isTurn] = data.split("|");
                myTurn = (isTurn === "true"); 
                currentOppCount = parseInt(oppCount);
                renderGame(handStr.split(",").filter(s=>s).map(Number), currentOppCount, myTurn);
            } else if (data.startsWith("WINNER:")) { 
                showResult(data.split(":")[1]); 
            } else if (data === "OPPONENT_LEFT") { 
                alert("相手が退出しました"); location.reload(); 
            }
        };

        function renderGame(myCards, oppCount, isTurn) {
            const myDiv = document.getElementById('my-hand'), 
                  oppDiv = document.getElementById('opponent-hand'), 
                  status = document.getElementById('status'), 
                  ctrl = document.getElementById('control-panel');
            
            // 相手の手札描画
            oppDiv.innerHTML = "";
            for (let i = 0; i < oppCount; i++) {
                const el = document.createElement('div'); 
                el.className = "card-wrapper card-back";
                const offset = (i - (oppCount-1)/2) * 35;
                el.style.transform = `translateX(${offset}px) rotate(${(i - (oppCount-1)/2) * 4}deg)`;
                
                const arrow = document.createElement('div'); 
                arrow.className = "cursor-arrow"; 
                arrow.innerHTML = "▼";
                el.appendChild(arrow);

                // カード直接クリックでも引けるようにする
                el.onclick = () => { 
                    if(isTurn && !isAnimating) { 
                        selectedIndex = i; 
                        updateCursor(); 
                        setTimeout(confirmDraw, 100); 
                    } 
                };
                oppDiv.appendChild(el);
            }

            // 操作パネルの再構築
            ctrl.innerHTML = "";
            if (isTurn && oppCount > 0) {
                ctrl.innerHTML = `
                    <button class="nav-btn" onclick="moveCursor(-1)">◀</button>
                    <button class="draw-btn" id="final-btn" onclick="confirmDraw()">カードを引く</button>
                    <button class="nav-btn" onclick="moveCursor(1)">▶</button>
                `;
                // 枚数が減った時にインデックスが範囲外にならないよう調整
                if (selectedIndex >= oppCount) selectedIndex = Math.max(0, oppCount - 1);
                updateCursor();
            }

            // 自分の手札描画
            myDiv.innerHTML = "";
            const suits = ["hearts", "spades", "diamonds", "clubs"], 
                  vals = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];
            myCards.forEach((n, i) => {
                const file = (n === 53) ? "black_joker.png" : `${vals[(n-1)%13]}_of_${suits[Math.floor((n-1)/13)]}.png`;
                const el = document.createElement('div'); 
                el.className = "card-wrapper"; 
                el.id = `card-${n}`;
                const offset = (i - (myCards.length-1)/2) * 45;
                el.style.transform = `translateX(${offset}px) rotate(${(i - (myCards.length-1)/2) * 3}deg)`;
                el.innerHTML = `<img src="images/png/${file}" class="card-img">`;
                myDiv.appendChild(el);
            });

            // 演出とターンの同期
            setTimeout(() => {
                const map = {}; 
                myCards.forEach(n => { if(n<53) { const v=(n-1)%13+1; (map[v]=map[v]||[]).push(n); } });
                let pairs = []; 
                Object.values(map).forEach(g => { while(g.length >= 2) pairs.push(g.pop(), g.pop()); });
                
                if (pairs.length > 0) {
                    isAnimating = true; 
                    status.innerText = "ペアを捨てています...";
                    pairs.forEach(id => {
                        const target = document.getElementById(`card-${id}`);
                        if(target) target.classList.add('discard-animation');
                    });
                    setTimeout(() => { socket.send("DISCARD_DONE"); }, 1500);
                } else {
                    isAnimating = false;
                    // 枚数チェック
                    if (myCards.length === 0 || oppCount === 0) {
                        socket.send("DISCARD_DONE");
                    } else {
                        status.innerText = isTurn ? "あなたの番です！" : "相手が選び中...";
                        status.style.color = isTurn ? "#ffd700" : "white";
                    }
                }
            }, 600);
        }

        // カーソル移動とボタン更新を分離
        function moveCursor(dir) {
            if (currentOppCount > 0 && !isAnimating) {
                selectedIndex = (selectedIndex + dir + currentOppCount) % currentOppCount;
                updateCursor();
            }
        }

        function updateCursor() {
            const cards = document.querySelectorAll('.card-back');
            cards.forEach((el, i) => {
                const arrow = el.querySelector('.cursor-arrow');
                if (i === selectedIndex) {
                    el.classList.add('selected-card');
                    if (arrow) arrow.style.display = "block";
                } else {
                    el.classList.remove('selected-card');
                    if (arrow) arrow.style.display = "none";
                }
            });
        }

        function confirmDraw() {
            // デバッグ用: console.log("Confirm Draw - Turn:", myTurn, "Animating:", isAnimating, "Index:", selectedIndex);
            if (myTurn && !isAnimating && currentOppCount > 0) {
                isAnimating = true;
                socket.send("DRAW:" + selectedIndex);
                const btn = document.getElementById('final-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "通信中...";
                }
            }
        }

        function showResult(msg) {
            const o = document.getElementById('result-overlay'), 
                  t = document.getElementById('result-text');
            t.innerText = msg;
            t.className = msg.includes("WIN") ? "win" : "lose";
            o.style.display = "flex";
        }

        window.addEventListener('keydown', (e) => {
            if (myTurn && !isAnimating) {
                if (e.key === "ArrowLeft") moveCursor(-1);
                if (e.key === "ArrowRight") moveCursor(1);
                if (e.key === "Enter") confirmDraw();
            }
        });

        socket.onopen = () => { document.getElementById('status').innerText = "ルームIDを入力してください"; };
    </script>
