<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Royal Old Maid - Professional</title>
    <style>
        :root { --card-w: 100px; --card-h: 150px; --gold: #ffd700; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #071a08; color: white; margin: 0; overflow: hidden; text-align: center; }
        
        #game-screen { 
            display: flex; flex-direction: column; align-items: center; height: 100vh; 
            background: radial-gradient(circle at center, #1b5e20 0%, #071a08 100%); 
        }

        #status-bar { 
            font-size: 2rem; font-weight: 900; color: var(--gold); margin: 30px 0; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); letter-spacing: 2px;
        }

        .hand-area { position: relative; height: 220px; width: 100%; display: flex; justify-content: center; align-items: flex-end; perspective: 1200px; }

        /* カードの基本：transition を 0.6s にして入れ替わりを見せる */
        .card-wrapper { 
            position: absolute; width: var(--card-w); height: var(--card-h); 
            border-radius: 12px; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            cursor: pointer; transform-style: preserve-3d;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            background-size: cover;
        }

        .card-back { 
            background: #b71c1c; border: 3px solid #eee; 
            background-image: repeating-linear-gradient(45deg, #b71c1c, #b71c1c 10px, #d32f2f 10px, #d32f2f 20px); 
        }

        .my-card { background: white; border: 1px solid #ddd; }

        .cursor-arrow { 
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%); 
            color: var(--gold); font-size: 3rem; display: none; filter: drop-shadow(0 0 8px orange);
        }
        
        /* 選択時 */
        .selected { transform: translateY(-40px) scale(1.1) !important; z-index: 500 !important; box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4); }
        .selected .cursor-arrow { display: block; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-15px); } }

        /* 捨てる演出 */
        .discard-target { z-index: 1000 !important; transform: scale(1.2) translateY(-20px) !important; filter: brightness(1.5); }
        .discard-fly { animation: discardAnim 0.8s ease-in forwards; pointer-events: none; }
        @keyframes discardAnim {
            0% { transform: scale(1.2) translateY(-20px) rotate(0); opacity: 1; }
            100% { transform: scale(0.2) translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        #control-panel { display: flex; align-items: center; gap: 20px; margin: 40px 0; height: 80px; }
        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; border-radius: 12px; cursor: pointer; }
        .draw-btn { 
            background: linear-gradient(135deg, #ffd700, #ffb300); color: #222; border: none; 
            padding: 20px 60px; border-radius: 50px; font-size: 1.6rem; cursor: pointer; font-weight: 900; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .draw-btn:disabled { background: #555; opacity: 0.5; }

        .divider { width: 85%; height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
        #room-overlay { position: fixed; inset: 0; background: #071a08; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: white; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="room-overlay">
    <h1 style="color:var(--gold);">ROYAL OLD MAID</h1>
    <input type="text" id="room-input" placeholder="Room ID">
    <button class="draw-btn" onclick="join()">ENTER ROOM</button>
</div>

<div id="game-screen">
    <div id="status-bar">Connecting...</div>
    <div id="opp-hand-area" class="hand-area"></div>
    <div id="control-panel"></div>
    <div class="divider"></div>
    <div id="my-hand" class="hand-area"></div>
</div>

<script>
    const socket = new WebSocket('wss://old-maid-online.onrender.com');
    let myHand = [], oppCount = 0, isTurn = false, selectedIdx = 0, animating = false;
    let isFirstLoad = true;

    socket.onmessage = (e) => {
        const data = e.data;
        if (data.startsWith("STATE|")) {
            const [_, cards, count, turn] = data.split("|");
            myHand = cards.split(",").filter(s=>s).map(Number);
            oppCount = parseInt(count);
            isTurn = (turn === "true");
            document.getElementById('room-overlay').style.display = "none";
            
            if (isFirstLoad) {
                isFirstLoad = false;
                updateUI();
                setTimeout(checkPairs, 1000);
            } else if (!animating) {
                updateUI();
            }
        } else if (data.startsWith("WINNER:")) {
            const msg = data.split(":")[1];
            document.getElementById('status-bar').innerText = msg;
            setTimeout(() => { alert(msg); location.reload(); }, 1000);
        }
    };

    function join() {
        const rid = document.getElementById('room-input').value;
        if(rid && socket.readyState === 1) socket.send("JOIN_ROOM:" + rid);
    }

    function getCardFile(n) {
        if (n === 53) return "black_joker.png";
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        if (val === 1) val = "ace";
        else if (val === 11) val = "jack";
        else if (val === 12) val = "queen";
        else if (val === 13) val = "king";
        return `${val}_of_${suit}.png`;
    }

    function updateUI() {
        if (animating) return;
        
        const oppArea = document.getElementById('opp-hand-area');
        const myArea = document.getElementById('my-hand');
        
        // 1. 相手の手札（枚数分、一意なIDで管理）
        renderOpponentCards(oppArea);
        
        // 2. 自分の手札（カード番号をIDにして管理）
        renderMyCards(myArea);

        // 3. ボタンとステータス
        const status = document.getElementById('status-bar');
        const panel = document.getElementById('control-panel');
        status.innerText = isTurn ? "YOUR TURN" : "OPPONENT DRAWING...";
        status.style.color = isTurn ? "var(--gold)" : "#aaa";
        
        if (isTurn && oppCount > 0) {
            panel.innerHTML = `
                <button class="nav-btn" onclick="move(-1)">◀ LEFT</button>
                <button id="draw-confirm" class="draw-btn" onclick="confirmDraw()">DRAW THIS CARD</button>
                <button class="nav-btn" onclick="move(1)">RIGHT ▶</button>
            `;
        } else {
            panel.innerHTML = "";
        }
    }

    function renderOpponentCards(container) {
        // 現在表示されているカードIDを取得
        const currentCards = Array.from(container.children);
        
        // 足りない分を追加、多い分を削除
        while (container.children.length < oppCount) {
            const div = document.createElement('div');
            div.className = "card-wrapper card-back";
            container.appendChild(div);
        }
        while (container.children.length > oppCount) {
            container.removeChild(container.lastChild);
        }

        // 全カードの位置を更新（シャッフル対応）
        Array.from(container.children).forEach((el, i) => {
            const x = (i - (oppCount-1)/2) * 35;
            const rot = (i - (oppCount-1)/2) * 2;
            el.style.transform = `translateX(${x}px) rotate(${rot}deg)`;
            el.style.zIndex = i;
            
            if (isTurn && i === selectedIdx) {
                el.classList.add('selected');
                el.innerHTML = `<div class="cursor-arrow">▼</div>`;
            } else {
                el.classList.remove('selected');
                el.innerHTML = "";
            }
        });
    }

    function renderMyCards(container) {
        // カード番号をキーにしてDOMを維持
        const existingIds = myHand.map(n => `card-${n}`);
        
        // 存在しないカード（捨てられたカード）を消す
        Array.from(container.children).forEach(el => {
            if (!existingIds.includes(el.id) && !el.classList.contains('discard-fly')) {
                container.removeChild(el);
            }
        });

        // 新しいカードを追加 & 全カードの位置更新
        myHand.forEach((n, i) => {
            let el = document.getElementById(`card-${n}`);
            if (!el) {
                el = document.createElement('div');
                el.id = `card-${n}`;
                el.className = "card-wrapper my-card";
                el.innerHTML = `<img src="images/png/${getCardFile(n)}" style="width:100%;height:100%;border-radius:10px;pointer-events:none;" onerror="this.src='https://via.placeholder.com/100x150?text=Card'">`;
                container.appendChild(el);
            }
            const x = (i - (myHand.length-1)/2) * 45;
            const rot = (i - (myHand.length-1)/2) * 1;
            el.style.transform = `translateX(${x}px) rotate(${rot}deg)`;
            el.style.zIndex = i;
        });
    }

    function confirmDraw() {
        if(!isTurn || animating || oppCount === 0) return;
        animating = true;
        const btn = document.getElementById('draw-confirm');
        if(btn) btn.disabled = true;

        socket.send("DRAW:" + selectedIdx);

        setTimeout(() => {
            // シャッフル後の状態を描画
            updateUI(); 
            setTimeout(checkPairs, 1200); 
        }, 500);
    }

    function checkPairs() {
        const counts = {};
        myHand.forEach(n => { if(n<53) { const v=(n-1)%13+1; (counts[v]=counts[v]||[]).push(n); } });
        const pairs = [];
        Object.values(counts).forEach(arr => { while(arr.length >= 2) pairs.push(arr.pop(), arr.pop()); });

        if (pairs.length > 0) {
            animating = true;
            pairs.forEach(id => {
                const el = document.getElementById("card-" + id);
                if(el) el.classList.add('discard-target');
            });

            setTimeout(() => {
                pairs.forEach(id => {
                    const el = document.getElementById("card-" + id);
                    if(el) el.classList.add('discard-fly');
                });
                
                setTimeout(() => { 
                    socket.send("DISCARD_DONE");
                    animating = false;
                    updateUI();
                }, 900);
            }, 600);
        } else {
            socket.send("DISCARD_DONE");
            animating = false;
            updateUI();
        }
    }

    function move(dir) {
        if(!isTurn || animating || oppCount === 0) return;
        selectedIdx = (selectedIdx + dir + oppCount) % oppCount;
        updateUI();
    }

    window.onkeydown = (e) => {
        if(e.key === "ArrowLeft") move(-1);
        if(e.key === "ArrowRight") move(1);
        if(e.key === "Enter") confirmDraw();
    };
</script>
</body>
</html>
