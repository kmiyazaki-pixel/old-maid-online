<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web Old Maid - Battle Mode</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1b5e20; color: white; margin: 0; overflow: hidden; }
        #status { font-size: 1.2em; padding: 10px; background: rgba(0,0,0,0.5); }
        
        /* 相手の手札エリア（上） */
        #opponent-hand { display: flex; justify-content: center; gap: -20px; margin-top: 20px; height: 150px; }
        
        /* 自分の手札エリア（下） */
        #my-hand { display: flex; justify-content: center; gap: 10px; margin-top: 100px; flex-wrap: wrap; }

        .card-wrapper { background: white; border-radius: 5px; padding: 3px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: 0.3s; }
        .card-img { width: 70px; display: block; }
        
        /* 相手のカード（裏向き） */
        .opponent-card { cursor: pointer; border: 2px solid transparent; }
        .opponent-card:hover { transform: translateY(10px); border-color: yellow; }

        /* ターンの強調 */
        .my-turn { border: 4px solid gold; border-radius: 10px; }

        .discard-animation { animation: fly-out 1s forwards; }
        @keyframes fly-out { to { transform: translateY(-1000px) rotate(45deg); opacity: 0; } }
    </style>
</head>
<body>

    <p id="status">接続中...</p>

    <div id="opponent-hand"></div>

    <hr style="border: 1px dashed rgba(255,255,255,0.2); margin: 40px 0;">

    <div id="my-hand"></div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');
        let canDraw = false;

        socket.onmessage = (event) => {
            const data = event.data;

            if (data.startsWith("STATE|")) {
                const parts = data.split("|");
                const myCards = parts[1].split(",").map(Number);
                const opponentCount = parseInt(parts[2]);
                const isMyTurn = parts[3] === "true";
                canDraw = isMyTurn;

                updateUI(myCards, opponentCount, isMyTurn);
            }
        };

        function updateUI(myCards, opponentCount, isMyTurn) {
            const status = document.getElementById('status');
            status.innerText = isMyTurn ? "あなたの番です！相手のカードを1枚選んでください" : "相手の番です。待機中...";
            status.style.background = isMyTurn ? "#d32f2f" : "rgba(0,0,0,0.5)";

            // 相手の手札を描画（裏面）
            const oppDiv = document.getElementById('opponent-hand');
            oppDiv.innerHTML = "";
            for (let i = 0; i < opponentCount; i++) {
                const card = document.createElement('div');
                card.className = "card-wrapper opponent-card";
                card.innerHTML = `<img src="images/png/back.png" class="card-img">`; // back.pngがある前提
                card.onclick = () => { if(canDraw) socket.send("DRAW:" + i); };
                oppDiv.appendChild(card);
            }

            // 自分の手札を描画（表面）
            const myDiv = document.getElementById('my-hand');
            myDiv.innerHTML = "";
            const suits = ["hearts", "spades", "diamonds", "clubs"];
            const values = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];

            myCards.forEach(n => {
                const fileName = (n === 53) ? "black_joker.png" : `${values[(n - 1) % 13]}_of_${suits[Math.floor((n - 1) / 13)]}.png`;
                const wrapper = document.createElement('div');
                wrapper.className = "card-wrapper";
                wrapper.innerHTML = `<img src="images/png/${fileName}" class="card-img">`;
                myDiv.appendChild(wrapper);
            });
        }
    </script>
</body>
</html>
