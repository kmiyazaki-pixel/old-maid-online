<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Old Maid - Elegant Edition</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; 
            background-color: #1b5e20; /* 深いカジノグリーン */
            color: white; 
            margin: 0;
            padding: 20px;
            overflow: hidden; /* アニメーションがはみ出さないように */
        }

        #status {
            font-size: 1.4em;
            margin: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            min-height: 1.5em;
        }

        #hand { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 50px; 
            flex-wrap: wrap; 
            perspective: 1000px;
        }

        /* カードの基本デザイン */
        .card-wrapper {
            background-color: white;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card-img { 
            width: 80px; 
            height: auto; 
            display: block;
            border-radius: 4px;
        }

        /* 1. 配られる時のアニメーション */
        .deal-in {
            animation: deal-in-anim 0.6s cubic-bezier(0.23, 1, 0.32, 1) backwards;
        }

        @keyframes deal-in-anim {
            from { transform: translateY(500px) rotate(20deg); opacity: 0; }
            to { transform: translateY(0) rotate(0); opacity: 1; }
        }

        /* 2. 捨てる時の優雅なアニメーション */
        .discard-animation {
            animation: fly-out-anim 1.2s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes fly-out-anim {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            30% { transform: translateY(-30px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(45deg) scale(0.5); opacity: 0; }
        }

        .card-wrapper:hover {
            transform: translateY(-20px);
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Web Old Maid</h1>
    <p id="status">対戦相手を待っています...</p>
    <div id="hand"></div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');

        socket.onmessage = (event) => {
            const msg = event.data;

            if (msg.startsWith("HAND:")) {
                const cardNumbers = msg.replace("HAND:", "").split(",").map(Number);
                const handDiv = document.getElementById('hand');
                handDiv.innerHTML = "";

                const suits = ["hearts", "spades", "diamonds", "clubs"];
                const values = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];

                // 1. すべてのカードを配る
                cardNumbers.forEach((num, index) => {
                    const n = num;
                    let fileName = (n === 53) ? "black_joker.png" : `${values[(n - 1) % 13]}_of_${suits[Math.floor((n - 1) / 13)]}.png`;

                    const wrapper = document.createElement('div');
                    wrapper.className = "card-wrapper deal-in";
                    wrapper.id = `card-${n}`;
                    wrapper.style.animationDelay = `${index * 0.08}s`; // パラパラ配る

                    const img = document.createElement('img');
                    img.src = `images/png/${fileName}`;
                    img.className = "card-img";

                    wrapper.appendChild(img);
                    handDiv.appendChild(wrapper);
                });

                document.getElementById('status').innerText = "カードが配られました...";

                // 2. 2.5秒後にペアを「優雅に」捨てる
                setTimeout(() => {
                    document.getElementById('status').innerText = "ペアを捨てています...";
                    
                    const valueMap = {};
                    cardNumbers.forEach(n => {
                        if (n === 53) return;
                        const v = (n - 1) % 13 + 1;
                        if (!valueMap[v]) valueMap[v] = [];
                        valueMap[v].push(n);
                    });

                    Object.values(valueMap).forEach(group => {
                        while (group.length >= 2) {
                            const p1 = group.pop();
                            const p2 = group.pop();
                            document.getElementById(`card-${p1}`).classList.add('discard-animation');
                            document.getElementById(`card-${p2}`).classList.add('discard-animation');
                        }
                    });

                    // 3. アニメーションが終わったらDOMから消す
                    setTimeout(() => {
                        document.querySelectorAll('.discard-animation').forEach(el => el.remove());
                        document.getElementById('status').innerText = "整理完了！あなたのターンです。";
                    }, 1200);

                }, 2500);
            }
        };
    </script>
</body>
</html>
