<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Royal Old Maid</title>
    <style>
        :root { --card-w: 80px; --card-h: 120px; }
        body { font-family: sans-serif; text-align: center; background: #1b5e20; color: white; margin: 0; overflow: hidden; }
        #room-select { position: fixed; inset: 0; background: #1b5e20; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 30px; border: none; margin: 10px; width: 200px; text-align: center; }
        button { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; background: #ffd700; border: none; border-radius: 30px; font-weight: bold; }
        #status { font-size: 1.2rem; padding: 15px; background: rgba(0,0,0,0.3); }
        .hand-container { position: relative; height: 160px; display: flex; justify-content: center; align-items: center; }
        .card-wrapper { position: absolute; width: var(--card-w); height: var(--card-h); background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: 0.3s; }
        .card-back { background: #c62828; border: 2px solid white; }
        .selected-card { transform: translateY(20px) scale(1.1) !important; border: 3px solid #ffd700 !important; z-index: 100; }
        #control-panel { display: flex; justify-content: center; gap: 10px; margin-top: 20px; min-height: 50px; }
        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; flex-direction: column; justify-content: center; align-items: center; }
        .discard-animation { animation: fly 1s forwards; }
        @keyframes fly { 100% { transform: translateY(-600px) rotate(180deg); opacity: 0; } }
    </style>
</head>
<body>
    <div id="room-select">
        <h2 id="msg">ROOM IDを入力</h2>
        <input type="text" id="room-id-input" placeholder="ID">
        <button onclick="joinRoom()">入室</button>
    </div>
    <div id="status">Connecting...</div>
    <div id="opponent-hand" class="hand-container"></div>
    <div id="control-panel"></div>
    <div id="my-hand" class="hand-container"></div>
    <div id="result-overlay"><h1 id="res-txt"></h1><button onclick="location.reload()">もう一度</button></div>

    <script>
        // ★重要★ ここをご自身のURLに書き換えてください
        const SERVER_URL = 'wss://old-maid-online.onrender.com';
        
        let socket, myTurn = false, isAnimating = false, selectedIndex = 0, currentOppCount = 0;
        let pendingRoom = null;

        function connect() {
            socket = new WebSocket(SERVER_URL);
            socket.onopen = () => {
                document.getElementById('status').innerText = "Connected";
                if (pendingRoom) socket.send("JOIN_ROOM:" + pendingRoom);
            };
            socket.onmessage = (e) => {
                const data = e.data;
                if (data.startsWith("STATE|")) {
                    document.getElementById('room-select').style.display = "none";
                    const [_, handStr, oppCount, turn] = data.split("|");
                    myTurn = (turn === "true"); currentOppCount = parseInt(oppCount);
                    render(handStr.split(",").filter(s=>s).map(Number), currentOppCount);
                } else if (data.startsWith("WINNER:")) {
                    document.getElementById('result-overlay').style.display = "flex";
                    document.getElementById('res-txt').innerText = data.split(":")[1];
                }
            };
            socket.onclose = () => setTimeout(connect, 2000);
        }
        connect();

        function joinRoom() {
            const id = document.getElementById('room-id-input').value;
            if (!id) return;
            if (socket.readyState === WebSocket.OPEN) {
                socket.send("JOIN_ROOM:" + id);
                document.getElementById('room-select').style.display = "none";
            } else {
                pendingRoom = id;
                document.getElementById('msg').innerText = "接続中...（少々お待ちください）";
            }
        }

        function render(cards, oppCount) {
            const oppDiv = document.getElementById('opponent-hand'), myDiv = document.getElementById('my-hand');
            oppDiv.innerHTML = ""; myDiv.innerHTML = "";
            
            // 相手
            for (let i = 0; i < oppCount; i++) {
                const el = document.createElement('div'); el.className = "card-wrapper card-back";
                el.style.left = `calc(50% - 40px + ${(i - (oppCount-1)/2) * 30}px)`;
                el.onclick = () => { if(myTurn && !isAnimating) { selectedIndex = i; draw(); } };
                if (myTurn && i === selectedIndex) el.classList.add('selected-card');
                oppDiv.appendChild(el);
            }
            // 操作
            const ctrl = document.getElementById('control-panel');
            ctrl.innerHTML = (myTurn && oppCount > 0) ? `<button onclick="moveCursor(-1)">◀</button><button onclick="draw()" style="width:120px">引く</button><button onclick="moveCursor(1)">▶</button>` : "";

            // 自分
            cards.forEach((n, i) => {
                const el = document.createElement('div'); el.className = "card-wrapper";
                el.id = `c-${n}`;
                el.style.left = `calc(50% - 40px + ${(i - (cards.length-1)/2) * 40}px)`;
                el.innerHTML = `<img src="images/png/${n===53?'black_joker.png':((n-1)%13+1)+'_of_'+['hearts','spades','diamonds','clubs'][Math.floor((n-1)/13)]+'.png'}" style="width:100%">`;
                myDiv.appendChild(el);
            });

            setTimeout(() => {
                let map = {}; cards.forEach(n => { if(n<53){ let v=(n-1)%13+1; (map[v]=map[v]||[]).push(n); } });
                let pairs = []; Object.values(map).forEach(g => { if(g.length >= 2) pairs.push(g.pop(), g.pop()); });
                if (pairs.length > 0) {
                    isAnimating = true;
                    pairs.forEach(id => document.getElementById(`c-${id}`).classList.add('discard-animation'));
                    setTimeout(() => { socket.send("DISCARD_DONE"); isAnimating = false; }, 1000);
                } else if (cards.length === 0 || oppCount === 0) {
                    socket.send("DISCARD_DONE");
                }
            }, 500);
        }

        function moveCursor(d) { selectedIndex = (selectedIndex + d + currentOppCount) % currentOppCount; renderCurrent(); }
        function draw() { if(myTurn && !isAnimating) { isAnimating = true; socket.send("DRAW:" + selectedIndex); } }
        // 再描画用（カード枚数が変わらない時）
        function renderCurrent() { 
            document.querySelectorAll('#opponent-hand .card-wrapper').forEach((el, i) => {
                el.classList.toggle('selected-card', i === selectedIndex);
            });
        }
    </script>
</body>
</html>
