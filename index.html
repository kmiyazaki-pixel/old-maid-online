<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web Old Maid</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2e7d32; color: white; margin-top: 50px; }
        #hand { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .card { 
            width: 80px; height: 120px; background-color: white; border-radius: 8px; 
            color: black; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; border: 2px solid #000;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
        }
        .joker { color: red; border: 2px solid red; }
    </style>
</head>
<body>

    <div id="main-display">
        <h1>Web Old Maid</h1>
        <p id="status">接続成功！対戦相手を待っています...</p>
    </div>
    
    <div id="hand"></div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');

        socket.onmessage = (event) => {
            if (event.data === "GAME_START:対戦開始！") {
                document.getElementById('status').innerText = "対戦開始！あなたの手札:";
                
                // 仮の手札を表示してみる（後でサーバーから本物を受け取ります）
                const handDiv = document.getElementById('hand');
                const myHand = ["♠A", "♥7", "♣K", "JOKER"];
                
                handDiv.innerHTML = ""; // 一旦空にする
                myHand.forEach(card => {
                    const cardElement = document.createElement('div');
                    cardElement.className = card === "JOKER" ? "card joker" : "card";
                    cardElement.innerText = card;
                    handDiv.appendChild(cardElement);
                });
            }
        };
    </script>
</body>
</html>
