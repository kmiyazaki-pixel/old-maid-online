<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web Old Maid - Room Edition</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #1b5e20; color: white; margin: 0; overflow-x: hidden; }
        
        /* ルーム入力画面 */
        #room-select {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1b5e20; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
        }
        input { padding: 10px; font-size: 1.2em; border-radius: 5px; border: none; margin: 10px; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; }

        #status { font-size: 1.3em; padding: 15px; background: rgba(0,0,0,0.6); min-height: 1.5em; }
        #opponent-hand, #my-hand { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 20px; min-height: 120px; }
        .card-wrapper { background: white; border-radius: 8px; padding: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: relative; }
        .card-img { width: 65px; display: block; border-radius: 4px; }
        .card-back { width: 65px; height: 98px; background-color: #b71c1c; border: 3px solid white; border-radius: 8px; cursor: pointer; }
        
        .discard-animation { animation: fly-out 1.2s cubic-bezier(0.5, -0.5, 0.3, 1.5) forwards; z-index: 1000; }
        @keyframes fly-out { to { transform: translateY(-1000px) rotate(60deg) scale(0.3); opacity: 0; } }
        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; font-size: 5em; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="room-select">
        <h1>Web Old Maid</h1>
        <p>ルームIDを入力して対戦を開始</p>
        <input type="text" id="room-id-input" placeholder="例: 1234">
        <button onclick="joinRoom()">入室する</button>
    </div>

    <div id="status">ルームに入室してください</div>
    <div id="opponent-hand"></div>
    <div id="my-hand"></div>
    <div id="result-overlay"></div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');
        let isAnimating = false;

        function joinRoom() {
            const roomId = document.getElementById('room-id-input').value;
            if (roomId) {
                socket.send("JOIN_ROOM:" + roomId);
                document.getElementById('room-select').style.display = "none";
            }
        }

        socket.onmessage = (event) => {
            const data = event.data;
            if (data.startsWith("WAITING:")) { document.getElementById('status').innerText = data.split(":")[1]; return; }
            if (data.startsWith("WINNER:")) { showResult(data.split(":")[1]); return; }
            if (data.startsWith("STATE|")) {
                const [_, myCardsStr, oppCount, isTurn] = data.split("|");
                const myCards = myCardsStr ? myCardsStr.split(",").filter(s => s).map(Number) : [];
                updateUI(myCards, parseInt(oppCount), isTurn === "true");
            }
        };

        function updateUI(myCards, oppCount, isTurn) {
            const myDiv = document.getElementById('my-hand');
            const oppDiv = document.getElementById('opponent-hand');
            const status = document.getElementById('status');
            
            oppDiv.innerHTML = "";
            for (let i = 0; i < oppCount; i++) {
                const cb = document.createElement('div');
                cb.className = "card-back";
                cb.onclick = () => { if(isTurn && !isAnimating) { socket.send("DRAW:" + i); } };
                oppDiv.appendChild(cb);
            }

            myDiv.innerHTML = "";
            const suits = ["hearts", "spades", "diamonds", "clubs"];
            const values = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];

            myCards.forEach((n, idx) => {
                const fileName = (n === 53) ? "black_joker.png" : `${values[(n - 1) % 13]}_of_${suits[Math.floor((n - 1) / 13)]}.png`;
                const wrap = document.createElement('div');
                wrap.className = "card-wrapper";
                wrap.id = `card-${n}`;
                wrap.innerHTML = `<img src="images/png/${fileName}" class="card-img">`;
                myDiv.appendChild(wrap);
            });

            setTimeout(() => {
                const valMap = {};
                myCards.forEach(n => {
                    if(n === 53) return;
                    const v = (n - 1) % 13 + 1;
                    if(!valMap[v]) valMap[v] = [];
                    valMap[v].push(n);
                });

                let pairs = [];
                Object.values(valMap).forEach(g => { while(g.length >= 2) pairs.push(g.pop(), g.pop()); });

                if (pairs.length > 0) {
                    isAnimating = true;
                    pairs.forEach(id => document.getElementById(`card-${id}`).classList.add('discard-animation'));
                    setTimeout(() => { isAnimating = false; socket.send("DISCARD_DONE"); }, 1300);
                } else {
                    isAnimating = false;
                    status.innerText = isTurn ? "あなたの番です！" : "相手のターンです";
                }
            }, 800);
        }

        function showResult(msg) {
            const o = document.getElementById('result-overlay');
            o.innerText = msg; o.style.display = "flex";
            o.style.color = msg.includes("WIN") ? "#FFD700" : "#ff5252";
        }
    </script>
</body>
</html>
