<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Webババ抜き</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
</head>
<body>
    <div id="game-container" style="width:100%; height:100vh;"></div>
    <script>
        cheerpjInit();
        // 表示エリアを作成
        cheerpjCreateDisplay(-1, -1, document.getElementById("game-container"));
        // 第2引数を "" (空文字) にすることで、同じ場所にある .class を読み込みます
        cheerpjRunMain("OldMaidApp", ""); 
    </script>
</body>
</html>
