<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web Old Maid - Precision Edition</title>
    <style>
        :root { --card-w: 80px; --card-h: 120px; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: radial-gradient(circle, #2e7d32, #1b5e20); color: white; margin: 0; height: 100vh; overflow: hidden; }
        
        #room-select { position: fixed; inset: 0; background: #1b5e20; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 30px; border: none; margin: 15px; width: 250px; text-align: center; }
        button { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; background: #ffd700; border: none; border-radius: 30px; font-weight: bold; color: #333; transition: 0.3s; }
        button:hover:not(:disabled) { background: #fff; transform: translateY(-3px); }
        button:disabled { background: #888; cursor: not-allowed; }

        #status { font-size: 1.4rem; padding: 20px; background: rgba(0,0,0,0.4); }
        .hand-container { position: relative; height: 180px; display: flex; justify-content: center; align-items: center; padding: 20px; margin-top: 20px; }
        
        /* カードデザイン */
        .card-wrapper { 
            position: absolute; width: var(--card-w); height: var(--card-h); 
            background: white; border-radius: 10px; padding: 5px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); transition: all 0.3s ease;
            border: 1px solid #ddd;
        }
        .card-img { width: 100%; height: 100%; border-radius: 6px; pointer-events: none; }
        .card-back { background: #c62828; border: 3px solid white; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px); }

        /* カーソル（セレクター）演出 */
        .selected-card { transform: translateY(25px) scale(1.1) !important; z-index: 100 !important; border: 4px solid #ffd700 !important; box-shadow: 0 0 20px #ffd700 !important; }
        .cursor-arrow { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #ffd700; animation: bounce 0.5s infinite alternate; display: none; }
        @keyframes bounce { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-10px); } }

        /* 操作パネル */
        #control-panel { display: flex; justify-content: center; gap: 10px; margin-top: 30px; padding: 10px; min-height: 50px; }
        .nav-btn { background: #333; color: white; border-radius: 5px; padding: 10px 15px; }
        .draw-btn { background: #ffd700; color: #333; font-weight: bold; padding: 10px 40px; font-size: 1.2rem; }

        /* 捨てる演出 */
        .discard-animation { animation: fly-away 1.5s forwards; z-index: 5000 !important; }
        @keyframes fly-away {
            30% { transform: scale(1.2) translateY(-50px) rotate(-10deg); }
            100% { transform: scale(0) translateY(-1000px) rotate(180deg); opacity: 0; }
        }

        #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; flex-direction: column; justify-content: center; align-items: center; }
        #result-text { font-size: 6rem; font-weight: 900; margin-bottom: 40px; }
    </style>
</head>
<body>

    <div id="room-select">
        <h1>ROYAL OLD MAID</h1>
        <input type="text" id="room-id-input" placeholder="Room ID">
        <button onclick="joinRoom()">入場する</button>
    </div>

    <div id="status">対戦相手を待っています...</div>
    
    <div id="opponent-hand" class="hand-container"></div>
    
    <div id="control-panel"></div>
    
    <div style="height: 1px; background: rgba(255,255,255,0.1); width: 80%; margin: 20px auto;"></div>
    <div id="my-hand" class="hand-container"></div>

    <div id="result-overlay">
        <div id="result-text"></div>
        <div style="display: flex; gap: 20px;">
            <button onclick="requestRematch()">再戦</button>
            <button onclick="location.reload()" style="background: #555;">退出</button>
        </div>
    </div>

    <script>
        const socket = new WebSocket('wss://old-maid-online.onrender.com');
        let isAnimating = false;
        let selectedIndex = 0; // 現在選択中のカード番号
        let currentOppCount = 0;
        let myTurn = false;

        function joinRoom() {
            const id = document.getElementById('room-id-input').value;
            if (id) { socket.send("JOIN_ROOM:" + id); document.getElementById('room-select').style.display = "none"; }
        }

        function requestRematch() { socket.send("REMATCH_REQUEST"); }

        socket.onmessage = (event) => {
            const data = event.data;
            if (data.startsWith("STATE|")) {
                const [_, handStr, oppCount, isTurn] = data.split("|");
                myTurn = (isTurn === "true");
                currentOppCount = parseInt(oppCount);
                renderGame(handStr.split(",").filter(s=>s).map(Number), currentOppCount, myTurn);
            } else if (data.startsWith("WINNER:")) {
                showResult(data.split(":")[1]);
            } else if (data === "OPPONENT_LEFT") {
                alert("相手が退出しました"); location.reload();
            }
        };

        function renderGame(myCards, oppCount, isTurn) {
            const myDiv = document.getElementById('my-hand');
            const oppDiv = document.getElementById('opponent-hand');
            const status = document.getElementById('status');
            const ctrl = document.getElementById('control-panel');
            
            // 相手の手札描画
            oppDiv.innerHTML = "";
            for (let i = 0; i < oppCount; i++) {
                const el = document.createElement('div');
                el.className = "card-wrapper card-back";
                el.id = `opp-card-${i}`;
                const offset = (i - (oppCount-1)/2) * 35;
                const rotate = (i - (oppCount-1)/2) * 4;
                el.style.transform = `translateX(${offset}px) rotate(${rotate}deg)`;
                
                // カーソル用矢印
                const arrow = document.createElement('div');
                arrow.className = "cursor-arrow";
                arrow.innerHTML = "▼";
                el.appendChild(arrow);
                
                el.onclick = () => { if(isTurn && !isAnimating) selectAndDraw(i); };
                oppDiv.appendChild(el);
            }

            // 操作パネルの更新
            ctrl.innerHTML = "";
            if (isTurn && oppCount > 0) {
                ctrl.innerHTML = `
                    <button class="nav-btn" onclick="moveCursor(-1)">◀ 左へ</button>
                    <button class="draw-btn" id="final-draw-btn" onclick="confirmDraw()">このカードを引く</button>
                    <button class="nav-btn" onclick="moveCursor(1)">右へ ▶</button>
                `;
                updateCursor();
            }

            // 自分の手札
            myDiv.innerHTML = "";
            const suits = ["hearts", "spades", "diamonds", "clubs"];
            const vals = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];
            myCards.forEach((n, i) => {
                const file = (n === 53) ? "black_joker.png" : `${vals[(n-1)%13]}_of_${suits[Math.floor((n-1)/13)]}.png`;
                const el = document.createElement('div');
                el.className = "card-wrapper";
                el.id = `card-${n}`;
                const offset = (i - (myCards.length-1)/2) * 50;
                el.style.transform = `translateX(${offset}px) rotate(${(i - (myCards.length-1)/2) * 2}deg)`;
                el.innerHTML = `<img src="images/png/${file}" class="card-img">`;
                myDiv.appendChild(el);
            });

            // ペアチェック
            setTimeout(() => {
                const map = {};
                myCards.forEach(n => { if(n<53) { const v=(n-1)%13+1; (map[v]=map[v]||[]).push(n); } });
                let pairs = [];
                Object.values(map).forEach(g => { while(g.length >= 2) pairs.push(g.pop(), g.pop()); });

                if (pairs.length > 0) {
                    isAnimating = true;
                    status.innerText = "ペアが見つかりました...";
                    pairs.forEach(id => document.getElementById(`card-${id}`).classList.add('discard-animation'));
                    setTimeout(() => { socket.send("DISCARD_DONE"); }, 1500);
                } else {
                    isAnimating = false;
                    status.innerText = isTurn ? "あなたの番です！" : "相手が引いています...";
                    status.style.color = isTurn ? "#ffd700" : "white";
                }
            }, 600);
        }

        // カーソル移動
        function moveCursor(dir) {
            selectedIndex = (selectedIndex + dir + currentOppCount) % currentOppCount;
            updateCursor();
        }

        function updateCursor() {
            document.querySelectorAll('.card-back').forEach((el, i) => {
                const arrow = el.querySelector('.cursor-arrow');
                if (i === selectedIndex) {
                    el.classList.add('selected-card');
                    if (arrow) arrow.style.display = "block";
                } else {
                    el.classList.remove('selected-card');
                    if (arrow) arrow.style.display = "none";
                }
            });
        }

        function confirmDraw() {
            if (myTurn && !isAnimating) {
                isAnimating = true;
                socket.send("DRAW:" + selectedIndex);
                document.getElementById('final-draw-btn').disabled = true;
            }
        }

        function selectAndDraw(i) {
            selectedIndex = i;
            updateCursor();
            setTimeout(confirmDraw, 200);
        }

        function showResult(msg) {
            const o = document.getElementById('result-overlay');
            const t = document.getElementById('result-text');
            t.innerText = msg;
            t.className = msg.includes("WIN") ? "win" : "lose";
            o.style.display = "flex";
        }

        // キーボード操作にも対応
        window.addEventListener('keydown', (e) => {
            if (!myTurn || isAnimating) return;
            if (e.key === "ArrowLeft") moveCursor(-1);
            if (e.key === "ArrowRight") moveCursor(1);
            if (e.key === "Enter") confirmDraw();
        });
    </script>
</body>
</html>
